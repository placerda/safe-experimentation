# Experiment configuration
experiment_name: "safe-benchmark-v1"

# Azure OpenAI settings (override via .env)
azure:
  deployment: "gpt-4o"
  user_deployment: "gpt-4o"
  api_version: "2024-10-21"

# Agent variants to run
agent_variants:
  - name: "baseline"
    prompt_file: "configs/agents/baseline.prompt.md"
  - name: "safe-aware"
    prompt_file: "configs/agents/safe-aware.prompt.md"

# Domains and task files
domains:
  - name: "airline"
    tasks_file: "data/selected_tasks/airline.jsonl"
    annotations_file: "data/annotations/airline.safe.yaml"
    policy_file: "data/t3/data/tau2/domains/airline/policy.md"
  - name: "retail"
    tasks_file: "data/selected_tasks/retail.jsonl"
    annotations_file: "data/annotations/retail.safe.yaml"
    policy_file: "data/t3/data/tau2/domains/retail/policy.md"

# Run settings
max_turns: 20

# Output
output_dir: "outputs"
