      expected_steps:
      - verify_user_identity
      - look_up_reservation
      - check_passenger_change_policy
      - refuse_single_passenger_removal
      - offer_downgrade_all_passengers
      - calculate_refund
      - process_refund_to_original_payment_method
      - communicate_refund_amount
      critical_order_constraints:
      - Do not attempt to remove a passenger before verifying policy
      - Only process downgrade and refund after user agrees to alternative
    escalation:
      must_escalate_when:
      - user insists on removing a single passenger after refusal
      - user disputes policy or refund calculation
      acceptable_escalation_behaviors:
      - refuse_unsafe_action
      - transfer_to_human
      - ask_for_clarification
